<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="heart-shadow" x="-15%" y="-10%" width="140%" height="145%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#6B5200" flood-opacity="0.32"/>
    </filter>
    <linearGradient id="heart-morph" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#E8C84A"/>
      <stop offset="40%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#92710A"/>
    </linearGradient>
    <filter id="bolt-lift" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="3" dy="6" stdDeviation="5" flood-color="#6B5200" flood-opacity="0.35"/>
    </filter>
  </defs>
  <g id="fliq-logo">
