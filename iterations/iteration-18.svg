<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gold-grad" x1="0" y1="0.5" x2="1" y2="0.5">
      <stop offset="0%" stop-color="#F5E6C4"/>
      <stop offset="40%" stop-color="#C9A84C"/>
      <stop offset="70%" stop-color="#92710A"/>
      <stop offset="100%" stop-color="#6B5200"/>
    </linearGradient>
  </defs>
  <g id="fliq-logo">
    <g id="background">
      <rect x="24" y="24" width="464" height="464" rx="104" fill="#FFFFFF"/>
      <rect x="24" y="24" width="464" height="464" rx="104" fill="none" stroke="#EBEBF0" stroke-width="2"/>
    </g>
    <!-- FLIQ wordmark -->
    <text
      x="256" y="300"
      font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
      font-weight="900"
      font-style="italic"
      font-size="164"
      fill="url(#gold-grad)"
      text-anchor="middle"
      letter-spacing="-2"
    >FLIQ</text>
    <!-- Witty touch: tiny wink eye replacing the dot of I -->
    <!-- Wink: small arc + dot, positioned where I's tittle would be -->
    <g id="wink" transform="translate(262, 178)">
      <path d="M-10 0 Q0 -8 10 0" stroke="#C9A84C" stroke-width="4" fill="none" stroke-linecap="round"/>
      <circle cx="14" cy="-2" r="3" fill="#C9A84C"/>
    </g>
  </g>
</svg>
