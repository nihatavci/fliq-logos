<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gold-to-premium gradient matching Fliq brand -->
    <linearGradient id="brand-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C9A84C"/>
      <stop offset="50%" stop-color="#F7C757"/>
      <stop offset="100%" stop-color="#9B59B6"/>
    </linearGradient>
    <!-- Subtle gold glow -->
    <filter id="text-glow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#C9A84C" flood-opacity="0.25"/>
    </filter>
  </defs>
  <g id="fliq-logo">
    <!-- White rounded square background -->
    <g id="background">
      <rect x="24" y="24" width="464" height="464" rx="104" fill="#FFFFFF"/>
      <rect x="24" y="24" width="464" height="464" rx="104" fill="none" stroke="#EBEBF0" stroke-width="2"/>
    </g>
    <!-- "Fliq" wordmark — bold italic, gold-to-purple gradient -->
    <g id="wordmark" filter="url(#text-glow)">
      <!-- F -->
      <path d="M72 336 L72 176 L196 176 L196 212 L116 212 L116 240 L180 240 L180 274 L116 274 L116 336Z"
        fill="url(#brand-grad)" transform="skewX(-8)"/>
      <!-- l -->
      <path d="M198 176 L198 336 L240 336 L240 176Z"
        fill="url(#brand-grad)" transform="skewX(-8)"/>
      <!-- i dot -->
      <circle cx="272" cy="168" r="18" fill="url(#brand-grad)" transform="skewX(-8)"/>
      <!-- i stem -->
      <path d="M252 204 L252 336 L292 336 L292 204Z"
        fill="url(#brand-grad)" transform="skewX(-8)"/>
      <!-- q — clean rounded shape -->
      <path d="M320 204 C320 184 340 172 368 172 C396 172 416 184 416 204 L416 316 C416 336 396 348 368 348 C340 348 320 336 320 316Z
             M352 206 C344 206 340 214 340 224 L340 296 C340 306 344 314 352 314 C360 314 364 306 364 296 L364 224 C364 214 360 206 352 206Z"
        fill="url(#brand-grad)" transform="skewX(-8)" fill-rule="evenodd"/>
      <!-- q descender -->
      <path d="M396 332 L396 396 L436 396 L436 332Z"
        fill="url(#brand-grad)" transform="skewX(-8)"/>
    </g>
  </g>
</svg>
