<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Drop shadow for depth -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#CC1A3A" flood-opacity="0.35"/>
    </filter>
    <!-- Inner glow on bolt -->
    <filter id="bolt-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#FF4D6D" flood-opacity="0.4"/>
    </filter>
  </defs>
  <g id="fliq-logo">
    <!-- Heart with drop shadow -->
    <g id="heart" filter="url(#shadow)">
      <path
        d="M256 420 C196 352 48 272 48 168 C48 88 108 36 184 36 C224 36 252 60 264 96 C276 60 304 36 344 36 C420 36 464 88 464 168 C464 272 316 352 256 420Z"
        fill="#FF4D6D"
      />
      <!-- Darker bottom half for depth -->
      <path
        d="M256 420 C196 352 48 272 48 212 C128 240 200 312 256 420Z"
        fill="#E63A5C" opacity="0.4"
      />
      <path
        d="M256 420 C316 352 464 272 464 212 C384 240 312 312 256 420Z"
        fill="#D42E50" opacity="0.3"
      />
    </g>
    <!-- Lightning bolt — centered, slightly rotated for dynamism -->
    <g id="bolt" filter="url(#bolt-glow)">
      <path
        d="M280 80 L220 228 L272 228 L232 400 L340 208 L284 208 L316 80Z"
        fill="#FFFFFF"
      />
    </g>
    <!-- Subtle highlight on top-left of heart -->
    <g id="highlight">
      <ellipse cx="148" cy="120" rx="44" ry="32" fill="#FFFFFF" opacity="0.18" transform="rotate(-20 148 120)"/>
    </g>
  </g>
</svg>
