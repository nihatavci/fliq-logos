<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#F7D96E"/>
      <stop offset="45%" stop-color="#E8C84A"/>
      <stop offset="100%" stop-color="#C9A84C"/>
    </linearGradient>
    <linearGradient id="bg-shine" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.30"/>
      <stop offset="45%" stop-color="#FFFFFF" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.05"/>
    </linearGradient>
    <!-- Glass from 33 — more depth/color than 44 -->
    <linearGradient id="glass" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.97"/>
      <stop offset="55%" stop-color="#FFFFFF" stop-opacity="0.82"/>
      <stop offset="100%" stop-color="#FFF8E8" stop-opacity="0.60"/>
    </linearGradient>
    <linearGradient id="shimmer" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="35%" stop-color="#FFFFFF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-15%" y="-10%" width="130%" height="150%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#A8882E" flood-opacity="0.40"/>
    </filter>
  </defs>

  <g id="fliq-logo">
    <rect x="24" y="24" width="464" height="464" rx="104" fill="url(#bg)"/>
    <rect x="24" y="24" width="464" height="464" rx="104" fill="url(#bg-shine)"/>

    <!--
      Changes from 44:
      - Tighter gaps: 15px visual gaps (was 25)
      - Wider f crossbar: extends further left & right
      - 33's glass gradient (more depth)
      - Clean rendering (no glow, no border layer)

      Stroke=38, half=19
      f: stem=132, crossbar 106-158 (wider!). Visual: 87-177. Width=90
      l: x=211. Visual: 192-230. Width=38. Gap from f: 192-177=15 ✓
      i: x=264. Visual: 245-283. Width=38. Gap from l: 245-230=15 ✓
      q: bowl cx=356 r=40. Visual: 297-415. Width=118. Gap from i: 297-283=14 ≈15 ✓

      Left pad: 87-24=63. Right pad: 488-415=73. Centered enough.
      Baseline=305, x-height=225, ascender=168
    -->

    <!-- SHADOW -->
    <g filter="url(#shadow)" transform="translate(0,3)" opacity="0.22">
      <path d="M132,305 L132,192 Q132,168 152,168 L162,168" fill="none"
            stroke="#8B7420" stroke-width="38" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="106" y1="225" x2="158" y2="225" stroke="#8B7420" stroke-width="38" stroke-linecap="round"/>
      <line x1="211" y1="168" x2="211" y2="305" stroke="#8B7420" stroke-width="38" stroke-linecap="round"/>
      <line x1="264" y1="225" x2="264" y2="305" stroke="#8B7420" stroke-width="38" stroke-linecap="round"/>
      <circle cx="264" cy="183" r="19" fill="#8B7420"/>
      <path d="M356,228 A40,40 0 0,1 396,268 L396,350 Q396,368 412,368" fill="none"
            stroke="#8B7420" stroke-width="38" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M396,268 A40,40 0 1,1 356,228" fill="none"
            stroke="#8B7420" stroke-width="38" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- MAIN GLASS -->
    <g>
      <!-- f stem + hook -->
      <path d="M132,305 L132,192 Q132,168 152,168 L162,168" fill="none"
            stroke="url(#glass)" stroke-width="38"
            stroke-linecap="round" stroke-linejoin="round"/>
      <!-- f crossbar — wider -->
      <line x1="106" y1="225" x2="158" y2="225" stroke="url(#glass)"
            stroke-width="38" stroke-linecap="round"/>

      <!-- l -->
      <line x1="211" y1="168" x2="211" y2="305" stroke="url(#glass)"
            stroke-width="38" stroke-linecap="round"/>

      <!-- i -->
      <line x1="264" y1="225" x2="264" y2="305" stroke="url(#glass)"
            stroke-width="38" stroke-linecap="round"/>
      <circle cx="264" cy="183" r="19" fill="url(#glass)"/>

      <!-- q — arc paths, no seam -->
      <path d="M356,228 A40,40 0 0,1 396,268 L396,350 Q396,368 412,368" fill="none"
            stroke="url(#glass)" stroke-width="38"
            stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M396,268 A40,40 0 1,1 356,228" fill="none"
            stroke="url(#glass)" stroke-width="38"
            stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- SHIMMER -->
    <g>
      <path d="M132,305 L132,192 Q132,168 152,168 L162,168" fill="none"
            stroke="url(#shimmer)" stroke-width="38" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="106" y1="225" x2="158" y2="225" stroke="url(#shimmer)" stroke-width="38" stroke-linecap="round"/>
      <line x1="211" y1="168" x2="211" y2="305" stroke="url(#shimmer)" stroke-width="38" stroke-linecap="round"/>
      <line x1="264" y1="225" x2="264" y2="305" stroke="url(#shimmer)" stroke-width="38" stroke-linecap="round"/>
      <circle cx="264" cy="183" r="19" fill="url(#shimmer)"/>
      <path d="M356,228 A40,40 0 0,1 396,268 L396,350 Q396,368 412,368" fill="none"
            stroke="url(#shimmer)" stroke-width="38" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M396,268 A40,40 0 1,1 356,228" fill="none"
            stroke="url(#shimmer)" stroke-width="38" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>
</svg>
