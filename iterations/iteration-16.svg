<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Rich gold gradient diagonal -->
    <linearGradient id="gold-text" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E8"/>
      <stop offset="25%" stop-color="#E8C84A"/>
      <stop offset="55%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#92710A"/>
    </linearGradient>
    <!-- Heavy emboss -->
    <filter id="emboss" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="4" flood-color="#000000" flood-opacity="0.75"/>
      <feDropShadow dx="0" dy="-3" stdDeviation="2.5" flood-color="#FFF8E8" flood-opacity="0.4"/>
    </filter>
    <!-- Gold glow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g id="fliq-logo">
    <!-- Dark bg + white border -->
    <g id="background">
      <rect x="24" y="24" width="464" height="464" rx="104" fill="#0D0D14"/>
      <rect x="24" y="24" width="464" height="464" rx="104" fill="none" stroke="#FFFFFF" stroke-width="5" stroke-opacity="0.18"/>
    </g>
    <!-- Gold glow haze -->
    <text
      x="256" y="300"
      font-family="Impact, Haettenschweiler, Arial Narrow Bold, sans-serif"
      font-weight="900"
      font-style="italic"
      font-size="180"
      fill="#C9A84C"
      fill-opacity="0.12"
      text-anchor="middle"
      letter-spacing="8"
      filter="url(#glow)"
    >FLIQ</text>
    <!-- Deep shadow -->
    <text
      x="257" y="306"
      font-family="Impact, Haettenschweiler, Arial Narrow Bold, sans-serif"
      font-weight="900"
      font-style="italic"
      font-size="180"
      fill="#000000"
      fill-opacity="0.65"
      text-anchor="middle"
      letter-spacing="8"
    >FLIQ</text>
    <!-- Highlight -->
    <text
      x="255" y="294"
      font-family="Impact, Haettenschweiler, Arial Narrow Bold, sans-serif"
      font-weight="900"
      font-style="italic"
      font-size="180"
      fill="#FFF8E8"
      fill-opacity="0.22"
      text-anchor="middle"
      letter-spacing="8"
    >FLIQ</text>
    <!-- Main text -->
    <text
      x="256" y="300"
      font-family="Impact, Haettenschweiler, Arial Narrow Bold, sans-serif"
      font-weight="900"
      font-style="italic"
      font-size="180"
      fill="url(#gold-text)"
      text-anchor="middle"
      letter-spacing="8"
      filter="url(#emboss)"
    >FLIQ</text>
  </g>
</svg>
