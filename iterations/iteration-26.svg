<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gold-grad" x1="0" y1="0.5" x2="1" y2="0.5">
      <stop offset="0%" stop-color="#F5E6C4"/>
      <stop offset="30%" stop-color="#E8C84A"/>
      <stop offset="70%" stop-color="#92710A"/>
      <stop offset="100%" stop-color="#6B5200"/>
    </linearGradient>
    <filter id="gold-glow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#C9A84C" flood-opacity="0.45"/>
    </filter>
  </defs>
  <g id="fliq-logo">
    <g id="background">
      <rect x="24" y="24" width="464" height="464" rx="104" fill="#FFFFFF"/>
      <rect x="24" y="24" width="464" height="464" rx="104" fill="none" stroke="#EBEBF0" stroke-width="2"/>
    </g>
    <!-- Glow layer -->
    <text
      x="256" y="300"
      font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
      font-weight="900"
      font-style="italic"
      font-size="176"
      fill="#C9A84C"
      fill-opacity="0.2"
      text-anchor="middle"
      letter-spacing="-2"
      filter="url(#gold-glow)"
    >FLIQ</text>
    <!-- Main text with harder gradient -->
    <text
      x="256" y="300"
      font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
      font-weight="900"
      font-style="italic"
      font-size="176"
      stroke="url(#gold-grad)"
      stroke-width="6"
      fill="url(#gold-grad)"
      text-anchor="middle"
      letter-spacing="-2"
    >FLIQ</text>
  </g>
</svg>
