<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <g id="background">
    <rect x="24" y="24" width="464" height="464" rx="104" fill="#FFFFFF" stroke="#EBEBF0" stroke-width="2"/>
  </g>

  <defs>
    <!-- Top-to-bottom gold gradient for 3D effect -->
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8C84A"/>
      <stop offset="55%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#92710A"/>
    </linearGradient>

    <!-- Subtle highlight for depth -->
    <linearGradient id="shieldHighlight" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#F5E6C4" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#F5E6C4" stop-opacity="0"/>
    </linearGradient>

    <!-- Mask: white = visible, black = cutout -->
    <mask id="boltCutout">
      <rect width="512" height="512" fill="white"/>
      <!-- Bold geometric lightning bolt, sized to read at 16px -->
      <path d="M240 180l-48 80h44l-20 80 64-96h-48l24-64z" fill="black"/>
    </mask>
  </defs>

  <!-- Shield group -->
  <g id="shield" mask="url(#boltCutout)">
    <!-- Modern abstract shield: rounded chevron/badge pointing up -->
    <path id="shieldBody" d="
      M256 100
      C196 100 148 114 136 118
      L136 268
      C136 320 164 364 200 396
      C220 414 240 426 256 436
      C272 426 292 414 312 396
      C348 364 376 320 376 268
      L376 118
      C364 114 316 100 256 100Z
    " fill="url(#shieldGrad)"/>

    <!-- Highlight overlay for premium depth -->
    <path d="
      M256 100
      C196 100 148 114 136 118
      L136 268
      C136 320 164 364 200 396
      C220 414 240 426 256 436
      C272 426 292 414 312 396
      C348 364 376 320 376 268
      L376 118
      C364 114 316 100 256 100Z
    " fill="url(#shieldHighlight)"/>
  </g>

  <!-- Thin gold outline on shield for definition -->
  <g id="shieldOutline">
    <path d="
      M256 100
      C196 100 148 114 136 118
      L136 268
      C136 320 164 364 200 396
      C220 414 240 426 256 436
      C272 426 292 414 312 396
      C348 364 376 320 376 268
      L376 118
      C364 114 316 100 256 100Z
    " fill="none" stroke="#A8882E" stroke-width="3" stroke-linejoin="round"/>
  </g>
</svg>