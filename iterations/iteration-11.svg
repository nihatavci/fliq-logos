<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="compassRingGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8C84A"/>
      <stop offset="50%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#92710A"/>
    </linearGradient>
    <linearGradient id="heartGrad" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#E8C84A"/>
      <stop offset="100%" stop-color="#C9A84C"/>
    </linearGradient>
    <linearGradient id="innerRingGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C9A84C" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#92710A" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="needleShadow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#92710A"/>
      <stop offset="100%" stop-color="#C9A84C"/>
    </linearGradient>
  </defs>

  <!-- White rounded square background -->
  <g id="background">
    <rect x="24" y="24" width="464" height="464" rx="104" fill="#FFFFFF" stroke="#EBEBF0" stroke-width="2"/>
  </g>

  <!-- Compass group, centered at 256,256 -->
  <g id="compass" transform="translate(256,256)">

    <!-- Subtle inner fill circle for depth -->
    <circle id="compassFace" cx="0" cy="0" r="148" fill="#FFF8E8"/>

    <!-- Inner concentric ring for depth -->
    <circle id="innerRing" cx="0" cy="0" r="120" fill="none" stroke="url(#innerRingGrad)" stroke-width="1.5"/>

    <!-- Second subtle concentric ring -->
    <circle id="innerRing2" cx="0" cy="0" r="100" fill="none" stroke="#F5E6C4" stroke-width="1"/>

    <!-- Outer compass ring -->
    <circle id="outerRing" cx="0" cy="0" r="148" fill="none" stroke="url(#compassRingGrad)" stroke-width="9"/>

    <!-- Cardinal tick marks N/S/E/W -->
    <g id="ticks" stroke="#92710A" stroke-width="3" stroke-linecap="round">
      <!-- North tick -->
      <path d="M0,-148 L0,-130"/>
      <!-- South tick -->
      <path d="M0,148 L0,130"/>
      <!-- East tick -->
      <path d="M148,0 L130,0"/>
      <!-- West tick -->
      <path d="M-148,0 L-130,0"/>
    </g>

    <!-- Minor tick marks (NE/NW/SE/SW) -->
    <g id="minorTicks" stroke="#C9A84C" stroke-width="1.5" stroke-linecap="round" opacity="0.5">
      <!-- NE -->
      <path d="M104.65,-104.65 L97.58,-97.58"/>
      <!-- NW -->
      <path d="M-104.65,-104.65 L-97.58,-97.58"/>
      <!-- SE -->
      <path d="M104.65,104.65 L97.58,97.58"/>
      <!-- SW -->
      <path d="M-104.65,104.65 L-97.58,97.58"/>
    </g>

    <!-- Small diamond at center pivot -->
    <g id="pivot">
      <path d="M0,-8 L6,0 L0,8 L-6,0 Z" fill="#92710A"/>
    </g>

    <!-- Heart-shaped compass needle pointing north -->
    <g id="heartNeedle">
      <!-- Heart needle pointing up/north - bold and clear -->
      <path d="M0,-110 C0,-110 -8,-96 -8,-96
               C-20,-96 -32,-86 -32,-72
               C-32,-54 -16,-38 0,-22
               C16,-38 32,-54 32,-72
               C32,-86 20,-96 8,-96
               C8,-96 0,-110 0,-110 Z"
            fill="url(#heartGrad)" stroke="#92710A" stroke-width="2"/>

      <!-- South pointer tail - sleek line opposite the heart -->
      <path d="M0,22 L-5,40 L0,110 L5,40 Z"
            fill="#F5E6C4" stroke="#C9A84C" stroke-width="1"/>
    </g>

    <!-- Thin crosshair lines for precision feel -->
    <g id="crosshairs" stroke="#C9A84C" stroke-width="0.5" opacity="0.3">
      <path d="M-60,0 L-15,0"/>
      <path d="M15,0 L60,0"/>
    </g>

  </g>
</svg>