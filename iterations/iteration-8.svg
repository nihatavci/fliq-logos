<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <g id="background">
    <rect width="512" height="512" rx="104" fill="#FFFFFF" stroke="#EBEBF0" stroke-width="2"/>
  </g>

  <!-- Chat Bubble Shadow -->
  <g id="bubble-shadow">
    <path d="M148 144 L348 128 C372 128 392 148 392 172 L400 312 C400 336 380 356 356 356 L220 364 L168 408 L180 356 L156 358 C132 358 112 338 112 314 L120 180 C120 156 136 140 148 144Z" fill="#92710A" opacity="0.25"/>
  </g>

  <!-- Chat Bubble Main -->
  <g id="bubble" transform="rotate(-6, 256, 256)">
    <!-- Bubble body -->
    <path d="M140 130 L340 130 C368 130 390 152 390 180 L390 310 C390 338 368 360 340 360 L210 360 L158 410 L172 360 L150 360 C122 360 100 338 100 310 L100 180 C100 152 122 130 150 130Z" fill="#C9A84C"/>

    <!-- Bubble depth/shadow edge -->
    <path d="M140 130 L340 130 C368 130 390 152 390 180 L390 310 C390 338 368 360 340 360 L210 360 L158 410 L172 360 L150 360 C122 360 100 338 100 310 L100 180 C100 152 122 130 150 130Z" fill="none" stroke="#92710A" stroke-width="6" opacity="0.3"/>

    <!-- Inner highlight -->
    <path d="M155 150 L330 150 C350 150 366 166 366 186 L366 270 C366 290 350 306 330 306 L155 306 C135 306 120 290 120 270 L120 186 C120 166 135 150 155 150Z" fill="#E8C84A" opacity="0.4"/>

    <!-- Dot indicators inside bubble -->
    <circle cx="195" cy="248" r="18" fill="#92710A" opacity="0.6"/>
    <circle cx="250" cy="248" r="18" fill="#92710A" opacity="0.45"/>
    <circle cx="305" cy="248" r="18" fill="#92710A" opacity="0.3"/>
  </g>

  <!-- 4-Point Spark/Star -->
  <g id="spark" transform="translate(370, 108)">
    <!-- Main spark -->
    <path d="M0 -48 C4 -16 16 -4 48 0 C16 4 4 16 0 48 C-4 16 -16 4 -48 0 C-16 -4 -4 -16 0 -48Z" fill="#E8C84A"/>
    <!-- Inner bright core -->
    <path d="M0 -24 C2 -8 8 -2 24 0 C8 2 2 8 0 24 C-2 8 -8 2 -24 0 C-8 -2 -2 -8 0 -24Z" fill="#FFF8E8"/>

    <!-- Small secondary spark -->
    <g transform="translate(40, -36)">
      <path d="M0 -16 C1.5 -5 5 -1.5 16 0 C5 1.5 1.5 5 0 16 C-1.5 5 -5 1.5 -16 0 C-5 -1.5 -1.5 -5 0 -16Z" fill="#E8C84A"/>
      <path d="M0 -8 C1 -3 3 -1 8 0 C3 1 1 3 0 8 C-1 3 -3 1 -8 0 C-3 -1 -1 -3 0 -8Z" fill="#FFF8E8"/>
    </g>
  </g>
</svg>