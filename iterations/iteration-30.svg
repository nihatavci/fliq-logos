<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Brighter, more open gold gradient — yellow-to-yellow with gold tones -->
    <linearGradient id="gold-grad" x1="0" y1="0.5" x2="1" y2="0.5">
      <stop offset="0%" stop-color="#F7D96E"/>
      <stop offset="40%" stop-color="#E8C84A"/>
      <stop offset="75%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#B8942A"/>
    </linearGradient>
    <filter id="gold-glow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#E8C84A" flood-opacity="0.4"/>
    </filter>
  </defs>
  <g id="fliq-logo">
    <g id="background">
      <rect x="24" y="24" width="464" height="464" rx="104" fill="#FFFFFF"/>
      <rect x="24" y="24" width="464" height="464" rx="104" fill="none" stroke="#EBEBF0" stroke-width="2"/>
    </g>
    <!-- Glow layer -->
    <text
      x="256" y="300"
      font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
      font-weight="900"
      font-style="italic"
      font-size="176"
      fill="#E8C84A"
      fill-opacity="0.18"
      text-anchor="middle"
      letter-spacing="-2"
      filter="url(#gold-glow)"
    >FLIQ</text>
    <!-- Dark border — thinner, less boss -->
    <text
      x="256" y="300"
      font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
      font-weight="900"
      font-style="italic"
      font-size="176"
      fill="none"
      stroke="#0D0D14"
      stroke-width="10"
      stroke-linejoin="round"
      text-anchor="middle"
      letter-spacing="-2"
    >FLIQ</text>
    <!-- Main gold text -->
    <text
      x="256" y="300"
      font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
      font-weight="900"
      font-style="italic"
      font-size="176"
      fill="url(#gold-grad)"
      stroke="url(#gold-grad)"
      stroke-width="3"
      text-anchor="middle"
      letter-spacing="-2"
    >FLIQ</text>
  </g>
</svg>
