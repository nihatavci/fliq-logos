<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Rich gold gradient — more contrast -->
    <linearGradient id="gold-text" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E8"/>
      <stop offset="30%" stop-color="#E8C84A"/>
      <stop offset="60%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#92710A"/>
    </linearGradient>
    <!-- Heavy emboss filter -->
    <filter id="emboss" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="5" stdDeviation="4" flood-color="#000000" flood-opacity="0.7"/>
      <feDropShadow dx="0" dy="-3" stdDeviation="3" flood-color="#FFF8E8" flood-opacity="0.35"/>
    </filter>
    <!-- Glow behind text -->
    <filter id="glow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g id="fliq-logo">
    <!-- Dark rounded square with white border -->
    <g id="background">
      <rect x="24" y="24" width="464" height="464" rx="104" fill="#0D0D14"/>
      <rect x="24" y="24" width="464" height="464" rx="104" fill="none" stroke="#FFFFFF" stroke-width="5" stroke-opacity="0.18"/>
    </g>
    <!-- Soft gold glow behind text -->
    <text
      x="256" y="295"
      font-family="Georgia, Times New Roman, serif"
      font-weight="bold"
      font-style="italic"
      font-size="168"
      fill="#C9A84C"
      fill-opacity="0.15"
      text-anchor="middle"
      letter-spacing="2"
      filter="url(#glow)"
    >FliQ</text>
    <!-- Deep shadow layer -->
    <text
      x="256" y="300"
      font-family="Georgia, Times New Roman, serif"
      font-weight="bold"
      font-style="italic"
      font-size="168"
      fill="#000000"
      fill-opacity="0.6"
      text-anchor="middle"
      letter-spacing="2"
    >FliQ</text>
    <!-- Bright highlight layer (top-left light source) -->
    <text
      x="254" y="288"
      font-family="Georgia, Times New Roman, serif"
      font-weight="bold"
      font-style="italic"
      font-size="168"
      fill="#FFF8E8"
      fill-opacity="0.2"
      text-anchor="middle"
      letter-spacing="2"
    >FliQ</text>
    <!-- Main gold text -->
    <text
      x="256" y="293"
      font-family="Georgia, Times New Roman, serif"
      font-weight="bold"
      font-style="italic"
      font-size="168"
      fill="url(#gold-text)"
      text-anchor="middle"
      letter-spacing="2"
      filter="url(#emboss)"
    >FliQ</text>
  </g>
</svg>
