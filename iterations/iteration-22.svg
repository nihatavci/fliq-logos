<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ringGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8C84A"/>
      <stop offset="45%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#A8882E"/>
    </linearGradient>
    <linearGradient id="tailGradient" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#92710A"/>
    </linearGradient>
    <!-- Clip to keep ring clean where tail overlaps -->
    <clipPath id="ringClip">
      <rect x="24" y="24" width="464" height="464"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <g id="background">
    <rect x="24" y="24" width="464" height="464" rx="104" fill="#FFFFFF" stroke="#EBEBF0" stroke-width="2"/>
  </g>

  <!-- Q Mark -->
  <g id="q-mark" clip-path="url(#ringClip)">

    <!-- Main Q ring — thick, bold, premium -->
    <circle
      id="q-ring"
      cx="234"
      cy="238"
      r="110"
      fill="none"
      stroke="url(#ringGradient)"
      stroke-width="48"
    />

    <!-- Q tail / flick swoosh — single confident stroke tapering upward-right -->
    <!-- Starts from lower-right of ring, sweeps out and up with energy -->
    <path
      id="flick-swoosh"
      d="M 302 322
         Q 340 370, 380 350
         Q 420 330, 420 280
         Q 420 240, 395 205"
      fill="none"
      stroke="url(#tailGradient)"
      stroke-width="38"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <!-- Tapered flick tip — thinner stroke for motion energy -->
    <path
      id="flick-tip"
      d="M 395 205
         Q 378 180, 358 162"
      fill="none"
      stroke="#92710A"
      stroke-width="22"
      stroke-linecap="round"
    />

    <!-- Small motion accent — thin stroke for speed lines -->
    <path
      id="motion-accent"
      d="M 370 172
         Q 355 158, 345 148"
      fill="none"
      stroke="#92710A"
      stroke-width="10"
      stroke-linecap="round"
      opacity="0.5"
    />

  </g>
</svg>