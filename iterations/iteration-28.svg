<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gold-grad" x1="0" y1="0.5" x2="1" y2="0.5">
      <stop offset="0%" stop-color="#F5E6C4"/>
      <stop offset="30%" stop-color="#E8C84A"/>
      <stop offset="70%" stop-color="#92710A"/>
      <stop offset="100%" stop-color="#6B5200"/>
    </linearGradient>
    <filter id="gold-glow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#C9A84C" flood-opacity="0.5"/>
    </filter>
    <!-- Relief/emboss: dark below, light above -->
    <filter id="relief" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="4" stdDeviation="1.5" flood-color="#0D0D14" flood-opacity="0.6"/>
      <feDropShadow dx="0" dy="-2" stdDeviation="1" flood-color="#FFF8E8" flood-opacity="0.3"/>
    </filter>
  </defs>
  <g id="fliq-logo">
    <g id="background">
      <rect x="24" y="24" width="464" height="464" rx="104" fill="#FFFFFF"/>
      <rect x="24" y="24" width="464" height="464" rx="104" fill="none" stroke="#EBEBF0" stroke-width="2"/>
    </g>
    <!-- Glow -->
    <text
      x="256" y="300"
      font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
      font-weight="900"
      font-style="italic"
      font-size="176"
      fill="#C9A84C"
      fill-opacity="0.15"
      text-anchor="middle"
      letter-spacing="-2"
      filter="url(#gold-glow)"
    >FLIQ</text>
    <!-- Dark outline -->
    <text
      x="256" y="300"
      font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
      font-weight="900"
      font-style="italic"
      font-size="176"
      fill="none"
      stroke="#0D0D14"
      stroke-width="18"
      stroke-linejoin="round"
      text-anchor="middle"
      letter-spacing="-2"
    >FLIQ</text>
    <!-- Mid border in dark gold for depth -->
    <text
      x="256" y="300"
      font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
      font-weight="900"
      font-style="italic"
      font-size="176"
      fill="none"
      stroke="#6B5200"
      stroke-width="10"
      stroke-linejoin="round"
      text-anchor="middle"
      letter-spacing="-2"
    >FLIQ</text>
    <!-- Main gold fill with relief filter -->
    <text
      x="256" y="300"
      font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
      font-weight="900"
      font-style="italic"
      font-size="176"
      fill="url(#gold-grad)"
      stroke="url(#gold-grad)"
      stroke-width="2"
      text-anchor="middle"
      letter-spacing="-2"
      filter="url(#relief)"
    >FLIQ</text>
  </g>
</svg>
