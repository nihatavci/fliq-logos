      />
      <path
        d="M260 432 C324 360 480 264 480 188 C480 188 380 300 260 432Z"
        fill="#6B5200" opacity="0.2"
      />
    </g>
    <g id="bolt" filter="url(#bolt-lift)">
      <path
        d="M300 48 L216 228 L276 220 L196 440 L344 212 L280 220 L332 48Z"
        fill="#FFFFFF"
      />
    </g>
    <g id="highlights">
      <ellipse cx="144" cy="108" rx="52" ry="28" fill="#FFFFFF" opacity="0.28" transform="rotate(-22 144 108)"/>
      <ellipse cx="152" cy="100" rx="28" ry="16" fill="#FFFFFF" opacity="0.15" transform="rotate(-22 152 100)"/>
    </g>
    <g id="sparks">
      <circle cx="184" cy="424" r="6" fill="#F5E6C4" opacity="0.6"/>
      <circle cx="212" cy="444" r="4" fill="#F5E6C4" opacity="0.4"/>
    </g>
  </g>
</svg>
