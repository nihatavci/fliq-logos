<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gold glass gradient for text -->
    <linearGradient id="gold-glass" gradientUnits="userSpaceOnUse" x1="256" y1="160" x2="256" y2="380">
      <stop offset="0%" stop-color="#F7D96E" stop-opacity="0.97"/>
      <stop offset="55%" stop-color="#E8C84A" stop-opacity="0.88"/>
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0.70"/>
    </linearGradient>
    <linearGradient id="shimmer-grad" gradientUnits="userSpaceOnUse" x1="256" y1="160" x2="256" y2="380">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.5"/>
      <stop offset="30%" stop-color="#FFFFFF" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-15%" y="-10%" width="130%" height="150%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#A8882E" flood-opacity="0.25"/>
    </filter>
    <mask id="letters">
      <path d="M132,305 L132,192 Q132,168 152,168 L162,168" fill="none" stroke="white" stroke-width="38" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="106" y1="225" x2="158" y2="225" stroke="white" stroke-width="38" stroke-linecap="round"/>
      <line x1="211" y1="168" x2="211" y2="305" stroke="white" stroke-width="38" stroke-linecap="round"/>
      <line x1="264" y1="225" x2="264" y2="305" stroke="white" stroke-width="38" stroke-linecap="round"/>
      <circle cx="264" cy="183" r="19" fill="white"/>
      <circle cx="356" cy="268" r="40" fill="none" stroke="white" stroke-width="38"/>
      <line x1="396" y1="268" x2="396" y2="360" stroke="white" stroke-width="38" stroke-linecap="butt"/>
      <circle cx="396" cy="360" r="19" fill="white"/>
    </mask>
  </defs>
  <g>
    <!-- White background -->
    <rect x="24" y="24" width="464" height="464" rx="104" fill="#FFFFFF"/>
    <rect x="24" y="24" width="464" height="464" rx="104" fill="none" stroke="#EBEBF0" stroke-width="2"/>

    <!-- SHADOW -->
    <g filter="url(#shadow)" transform="translate(0,3)" opacity="0.18">
      <path d="M132,305 L132,192 Q132,168 152,168 L162,168" fill="none" stroke="#A8882E" stroke-width="38" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="106" y1="225" x2="158" y2="225" stroke="#A8882E" stroke-width="38" stroke-linecap="round"/>
      <line x1="211" y1="168" x2="211" y2="305" stroke="#A8882E" stroke-width="38" stroke-linecap="round"/>
      <line x1="264" y1="225" x2="264" y2="305" stroke="#A8882E" stroke-width="38" stroke-linecap="round"/>
      <circle cx="264" cy="183" r="19" fill="#A8882E"/>
      <circle cx="356" cy="268" r="40" fill="none" stroke="#A8882E" stroke-width="38"/>
      <line x1="396" y1="268" x2="396" y2="360" stroke="#A8882E" stroke-width="38" stroke-linecap="butt"/>
      <circle cx="396" cy="360" r="19" fill="#A8882E"/>
    </g>

    <!-- GOLD GLASS LETTERS -->
    <rect x="0" y="0" width="512" height="512" fill="url(#gold-glass)" mask="url(#letters)"/>

    <!-- SHIMMER -->
    <rect x="0" y="0" width="512" height="512" fill="url(#shimmer-grad)" mask="url(#letters)"/>
  </g>
</svg>
