<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gold gradient background -->
    <linearGradient id="bg" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#F7D96E"/>
      <stop offset="45%" stop-color="#E8C84A"/>
      <stop offset="100%" stop-color="#C9A84C"/>
    </linearGradient>
    <!-- Top shine overlay -->
    <linearGradient id="bg-shine" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.30"/>
      <stop offset="45%" stop-color="#FFFFFF" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.05"/>
    </linearGradient>
    <!-- Shadow filter -->
    <filter id="shadow" x="-15%" y="-10%" width="130%" height="150%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#A8882E" flood-opacity="0.35"/>
    </filter>
    <!-- Subtle shimmer -->
    <linearGradient id="shimmer" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.4"/>
      <stop offset="25%" stop-color="#FFFFFF" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <g id="fliq-logo">
    <!-- Background -->
    <rect x="24" y="24" width="464" height="464" rx="104" fill="url(#bg)"/>
    <rect x="24" y="24" width="464" height="464" rx="104" fill="url(#bg-shine)"/>

    <!-- Uniform white, no gradient darkening -->
    <!-- f=118  l=196  i=274  q=362 -->
    <!-- Stroke: 40, round caps, baseline 320, x-height 235, ascender 175 -->

    <!-- SHADOW -->
    <g filter="url(#shadow)" opacity="0.25">
      <path d="M118,320 L118,200 Q118,172 143,172 L155,172" fill="none"
            stroke="#8B7420" stroke-width="40" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="96" y1="235" x2="148" y2="235" stroke="#8B7420" stroke-width="40" stroke-linecap="round"/>
      <line x1="196" y1="175" x2="196" y2="320" stroke="#8B7420" stroke-width="40" stroke-linecap="round"/>
      <line x1="274" y1="235" x2="274" y2="320" stroke="#8B7420" stroke-width="40" stroke-linecap="round"/>
      <circle cx="274" cy="190" r="20" fill="#8B7420"/>
      <!-- q as single native path -->
      <path d="M362,232 Q320,232 320,278 Q320,324 362,324 Q404,324 404,278 Q404,250 386,238 M404,278 L404,362 Q404,382 422,382" fill="none"
            stroke="#8B7420" stroke-width="40" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- MAIN WHITE LETTERS — uniform solid white -->
    <g>
      <!-- f stem + hook -->
      <path d="M118,320 L118,200 Q118,172 143,172 L155,172" fill="none"
            stroke="#FFFFFF" stroke-width="40" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- f crossbar -->
      <line x1="96" y1="235" x2="148" y2="235" stroke="#FFFFFF" stroke-width="40" stroke-linecap="round"/>

      <!-- l -->
      <line x1="196" y1="175" x2="196" y2="320" stroke="#FFFFFF" stroke-width="40" stroke-linecap="round"/>

      <!-- i body -->
      <line x1="274" y1="235" x2="274" y2="320" stroke="#FFFFFF" stroke-width="40" stroke-linecap="round"/>
      <!-- i dot -->
      <circle cx="274" cy="190" r="20" fill="#FFFFFF"/>

      <!-- q — single continuous path: bowl flows into descender naturally -->
      <path d="M362,232 Q320,232 320,278 Q320,324 362,324 Q404,324 404,278 Q404,250 386,238" fill="none"
            stroke="#FFFFFF" stroke-width="40" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- q descender — starts from right side of bowl, goes down and kicks -->
      <path d="M404,278 L404,362 Q404,382 422,382" fill="none"
            stroke="#FFFFFF" stroke-width="40" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- SHIMMER -->
    <g>
      <path d="M118,320 L118,200 Q118,172 143,172 L155,172" fill="none"
            stroke="url(#shimmer)" stroke-width="40" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="96" y1="235" x2="148" y2="235" stroke="url(#shimmer)" stroke-width="40" stroke-linecap="round"/>
      <line x1="196" y1="175" x2="196" y2="320" stroke="url(#shimmer)" stroke-width="40" stroke-linecap="round"/>
      <line x1="274" y1="235" x2="274" y2="320" stroke="url(#shimmer)" stroke-width="40" stroke-linecap="round"/>
      <circle cx="274" cy="190" r="20" fill="url(#shimmer)"/>
      <path d="M362,232 Q320,232 320,278 Q320,324 362,324 Q404,324 404,278 Q404,250 386,238" fill="none"
            stroke="url(#shimmer)" stroke-width="40" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M404,278 L404,362 Q404,382 422,382" fill="none"
            stroke="url(#shimmer)" stroke-width="40" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>
</svg>
