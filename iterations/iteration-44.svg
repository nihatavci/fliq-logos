<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#F7D96E"/>
      <stop offset="45%" stop-color="#E8C84A"/>
      <stop offset="100%" stop-color="#C9A84C"/>
    </linearGradient>
    <linearGradient id="bg-shine" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.30"/>
      <stop offset="45%" stop-color="#FFFFFF" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="glass" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.97"/>
      <stop offset="55%" stop-color="#FFFFFF" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#FFF8E8" stop-opacity="0.70"/>
    </linearGradient>
    <linearGradient id="shimmer" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.7"/>
      <stop offset="30%" stop-color="#FFFFFF" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-15%" y="-10%" width="130%" height="150%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#A8882E" flood-opacity="0.40"/>
    </filter>
  </defs>

  <g id="fliq-logo">
    <rect x="24" y="24" width="464" height="464" rx="104" fill="url(#bg)"/>
    <rect x="24" y="24" width="464" height="464" rx="104" fill="url(#bg-shine)"/>

    <!--
      Same spacing as 43 (25px equal visual gaps).
      NO glow filter — clean edges.
      NO white edge border layer — removes overlap artifacts on q.
      q drawn as single continuous path: two arcs for bowl + line + curve for tail.
    -->

    <!-- SHADOW -->
    <g filter="url(#shadow)" transform="translate(0,3)" opacity="0.22">
      <!-- f -->
      <path d="M122,305 L122,192 Q122,168 142,168 L152,168" fill="none"
            stroke="#8B7420" stroke-width="38" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="104" y1="225" x2="140" y2="225" stroke="#8B7420" stroke-width="38" stroke-linecap="round"/>
      <!-- l -->
      <line x1="203" y1="168" x2="203" y2="305" stroke="#8B7420" stroke-width="38" stroke-linecap="round"/>
      <!-- i -->
      <line x1="266" y1="225" x2="266" y2="305" stroke="#8B7420" stroke-width="38" stroke-linecap="round"/>
      <circle cx="266" cy="183" r="19" fill="#8B7420"/>
      <!-- q as single path -->
      <path d="M369,228 A40,40 0 0,1 409,268 L409,350 Q409,368 425,368 M409,268 A40,40 0 1,1 369,228" fill="none"
            stroke="#8B7420" stroke-width="38" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- MAIN GLASS — no glow filter -->
    <g>
      <!-- f -->
      <path d="M122,305 L122,192 Q122,168 142,168 L152,168" fill="none"
            stroke="url(#glass)" stroke-width="38"
            stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="104" y1="225" x2="140" y2="225" stroke="url(#glass)"
            stroke-width="38" stroke-linecap="round"/>

      <!-- l -->
      <line x1="203" y1="168" x2="203" y2="305" stroke="url(#glass)"
            stroke-width="38" stroke-linecap="round"/>

      <!-- i -->
      <line x1="266" y1="225" x2="266" y2="305" stroke="url(#glass)"
            stroke-width="38" stroke-linecap="round"/>
      <circle cx="266" cy="183" r="19" fill="url(#glass)"/>

      <!-- q — single continuous path: top of bowl → right arc → descender → kick, then rest of bowl -->
      <!-- First sub-path: right side of bowl flowing into tail -->
      <path d="M369,228 A40,40 0 0,1 409,268 L409,350 Q409,368 425,368" fill="none"
            stroke="url(#glass)" stroke-width="38"
            stroke-linecap="round" stroke-linejoin="round"/>
      <!-- Second sub-path: rest of bowl (left side) -->
      <path d="M409,268 A40,40 0 1,1 369,228" fill="none"
            stroke="url(#glass)" stroke-width="38"
            stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- SHIMMER -->
    <g>
      <path d="M122,305 L122,192 Q122,168 142,168 L152,168" fill="none"
            stroke="url(#shimmer)" stroke-width="38" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="104" y1="225" x2="140" y2="225" stroke="url(#shimmer)" stroke-width="38" stroke-linecap="round"/>
      <line x1="203" y1="168" x2="203" y2="305" stroke="url(#shimmer)" stroke-width="38" stroke-linecap="round"/>
      <line x1="266" y1="225" x2="266" y2="305" stroke="url(#shimmer)" stroke-width="38" stroke-linecap="round"/>
      <circle cx="266" cy="183" r="19" fill="url(#shimmer)"/>
      <path d="M369,228 A40,40 0 0,1 409,268 L409,350 Q409,368 425,368" fill="none"
            stroke="url(#shimmer)" stroke-width="38" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M409,268 A40,40 0 1,1 369,228" fill="none"
            stroke="url(#shimmer)" stroke-width="38" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>
</svg>
