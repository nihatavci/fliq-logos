<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gold-grad" x1="0" y1="0.5" x2="1" y2="0.5">
      <stop offset="0%" stop-color="#F5E6C4"/>
      <stop offset="30%" stop-color="#E8C84A"/>
      <stop offset="70%" stop-color="#92710A"/>
      <stop offset="100%" stop-color="#6B5200"/>
    </linearGradient>
    <linearGradient id="gold-grad-top" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF8E8"/>
      <stop offset="100%" stop-color="#C9A84C"/>
    </linearGradient>
    <filter id="gold-glow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="0" stdDeviation="14" flood-color="#C9A84C" flood-opacity="0.55"/>
    </filter>
    <filter id="boss-shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="2" dy="5" stdDeviation="2" flood-color="#0D0D14" flood-opacity="0.7"/>
    </filter>
  </defs>
  <g id="fliq-logo">
    <g id="background">
      <rect x="24" y="24" width="464" height="464" rx="104" fill="#FFFFFF"/>
      <rect x="24" y="24" width="464" height="464" rx="104" fill="none" stroke="#EBEBF0" stroke-width="2"/>
    </g>
    <!-- Glow -->
    <text
      x="256" y="300"
      font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
      font-weight="900"
      font-style="italic"
      font-size="176"
      fill="#C9A84C"
      fill-opacity="0.15"
      text-anchor="middle"
      letter-spacing="-2"
      filter="url(#gold-glow)"
    >FLIQ</text>
    <!-- Thick dark outline -->
    <text
      x="256" y="300"
      font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
      font-weight="900"
      font-style="italic"
      font-size="176"
      fill="none"
      stroke="#0D0D14"
      stroke-width="20"
      stroke-linejoin="round"
      text-anchor="middle"
      letter-spacing="-2"
    >FLIQ</text>
    <!-- Dark gold inner border -->
    <text
      x="256" y="300"
      font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
      font-weight="900"
      font-style="italic"
      font-size="176"
      fill="none"
      stroke="#92710A"
      stroke-width="12"
      stroke-linejoin="round"
      text-anchor="middle"
      letter-spacing="-2"
    >FLIQ</text>
    <!-- Main gold fill with boss shadow -->
    <text
      x="256" y="300"
      font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
      font-weight="900"
      font-style="italic"
      font-size="176"
      fill="url(#gold-grad)"
      text-anchor="middle"
      letter-spacing="-2"
      filter="url(#boss-shadow)"
    >FLIQ</text>
    <!-- Top highlight shine for 3D boss effect -->
    <text
      x="256" y="298"
      font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
      font-weight="900"
      font-style="italic"
      font-size="176"
      fill="url(#gold-grad-top)"
      fill-opacity="0.25"
      text-anchor="middle"
      letter-spacing="-2"
    >FLIQ</text>
  </g>
</svg>
