<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#F7D96E"/>
      <stop offset="45%" stop-color="#E8C84A"/>
      <stop offset="100%" stop-color="#C9A84C"/>
    </linearGradient>
    <linearGradient id="bg-shine" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.30"/>
      <stop offset="45%" stop-color="#FFFFFF" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.05"/>
    </linearGradient>
    <!-- Glass fill — same as 33 -->
    <linearGradient id="glass" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.97"/>
      <stop offset="55%" stop-color="#FFFFFF" stop-opacity="0.82"/>
      <stop offset="100%" stop-color="#FFF8E8" stop-opacity="0.60"/>
    </linearGradient>
    <!-- Shimmer — same as 33 -->
    <linearGradient id="shimmer" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="35%" stop-color="#FFFFFF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-15%" y="-10%" width="130%" height="150%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#A8882E" flood-opacity="0.50"/>
    </filter>
    <filter id="glow" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <g id="fliq-logo">
    <rect x="24" y="24" width="464" height="464" rx="104" fill="url(#bg)"/>
    <rect x="24" y="24" width="464" height="464" rx="104" fill="url(#bg-shine)"/>

    <!--
      33 positions: f=100, l=168, i=236, q=330
      New positions (more spread): f=95, l=175, i=255, q=348
      Gaps: f-l=80, l-i=80, i-q=93 (q wider so needs more)
      Stroke: 38 (slightly thinner than 33's 44 to allow more spacing)
      Baseline=310, x-height=228, ascender=168
      q tail same glass gradient as bowl
    -->

    <!-- SHADOW -->
    <g filter="url(#shadow)" transform="translate(0,3)">
      <path d="M95,310 L95,193 Q95,168 117,168 L130,168" fill="none"
            stroke="#B8942A" stroke-opacity="0.25" stroke-width="38"
            stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="78" y1="228" x2="120" y2="228" stroke="#B8942A" stroke-opacity="0.25"
            stroke-width="38" stroke-linecap="round"/>
      <line x1="175" y1="168" x2="175" y2="310" stroke="#B8942A" stroke-opacity="0.25"
            stroke-width="38" stroke-linecap="round"/>
      <line x1="255" y1="228" x2="255" y2="310" stroke="#B8942A" stroke-opacity="0.25"
            stroke-width="38" stroke-linecap="round"/>
      <circle cx="255" cy="186" r="19" fill="#B8942A" fill-opacity="0.25"/>
      <circle cx="348" cy="270" r="44" fill="none"
              stroke="#B8942A" stroke-opacity="0.25" stroke-width="38" stroke-linecap="round"/>
      <path d="M392,288 L392,362 Q392,385 410,385" fill="none"
            stroke="#B8942A" stroke-opacity="0.25" stroke-width="38"
            stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- MAIN GLASS LAYER -->
    <g filter="url(#glow)">
      <!-- f -->
      <path d="M95,310 L95,193 Q95,168 117,168 L130,168" fill="none"
            stroke="url(#glass)" stroke-width="38"
            stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="78" y1="228" x2="120" y2="228" stroke="url(#glass)"
            stroke-width="38" stroke-linecap="round"/>

      <!-- l -->
      <line x1="175" y1="168" x2="175" y2="310" stroke="url(#glass)"
            stroke-width="38" stroke-linecap="round"/>

      <!-- i -->
      <line x1="255" y1="228" x2="255" y2="310" stroke="url(#glass)"
            stroke-width="38" stroke-linecap="round"/>
      <circle cx="255" cy="186" r="19" fill="url(#glass)"/>

      <!-- q bowl — same glass -->
      <circle cx="348" cy="270" r="44" fill="none"
              stroke="url(#glass)" stroke-width="38" stroke-linecap="round"/>
      <!-- q tail — SAME glass gradient as bowl, not different -->
      <path d="M392,288 L392,362 Q392,385 410,385" fill="none"
            stroke="url(#glass)" stroke-width="38"
            stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- SHIMMER -->
    <g>
      <path d="M95,310 L95,193 Q95,168 117,168 L130,168" fill="none"
            stroke="url(#shimmer)" stroke-width="38"
            stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="78" y1="228" x2="120" y2="228" stroke="url(#shimmer)"
            stroke-width="38" stroke-linecap="round"/>
      <line x1="175" y1="168" x2="175" y2="310" stroke="url(#shimmer)"
            stroke-width="38" stroke-linecap="round"/>
      <line x1="255" y1="228" x2="255" y2="310" stroke="url(#shimmer)"
            stroke-width="38" stroke-linecap="round"/>
      <circle cx="255" cy="186" r="19" fill="url(#shimmer)"/>
      <circle cx="348" cy="270" r="44" fill="none"
              stroke="url(#shimmer)" stroke-width="38" stroke-linecap="round"/>
      <path d="M392,288 L392,362 Q392,385 410,385" fill="none"
            stroke="url(#shimmer)" stroke-width="38"
            stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- White edge border -->
    <g>
      <path d="M95,310 L95,193 Q95,168 117,168 L130,168" fill="none"
            stroke="#FFFFFF" stroke-opacity="0.35" stroke-width="40"
            stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M95,310 L95,193 Q95,168 117,168 L130,168" fill="none"
            stroke="url(#glass)" stroke-width="36"
            stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="78" y1="228" x2="120" y2="228" stroke="#FFFFFF" stroke-opacity="0.35"
            stroke-width="40" stroke-linecap="round"/>
      <line x1="78" y1="228" x2="120" y2="228" stroke="url(#glass)"
            stroke-width="36" stroke-linecap="round"/>

      <line x1="175" y1="168" x2="175" y2="310" stroke="#FFFFFF" stroke-opacity="0.35"
            stroke-width="40" stroke-linecap="round"/>
      <line x1="175" y1="168" x2="175" y2="310" stroke="url(#glass)"
            stroke-width="36" stroke-linecap="round"/>

      <line x1="255" y1="228" x2="255" y2="310" stroke="#FFFFFF" stroke-opacity="0.35"
            stroke-width="40" stroke-linecap="round"/>
      <line x1="255" y1="228" x2="255" y2="310" stroke="url(#glass)"
            stroke-width="36" stroke-linecap="round"/>

      <circle cx="348" cy="270" r="44" fill="none"
              stroke="#FFFFFF" stroke-opacity="0.35" stroke-width="40" stroke-linecap="round"/>
      <circle cx="348" cy="270" r="44" fill="none"
              stroke="url(#glass)" stroke-width="36" stroke-linecap="round"/>
      <path d="M392,288 L392,362 Q392,385 410,385" fill="none"
            stroke="#FFFFFF" stroke-opacity="0.35" stroke-width="40"
            stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M392,288 L392,362 Q392,385 410,385" fill="none"
            stroke="url(#glass)" stroke-width="36"
            stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>
</svg>
