<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#F7D96E"/>
      <stop offset="45%" stop-color="#E8C84A"/>
      <stop offset="100%" stop-color="#C9A84C"/>
    </linearGradient>
    <linearGradient id="bg-shine" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.30"/>
      <stop offset="45%" stop-color="#FFFFFF" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.05"/>
    </linearGradient>

    <!-- Glass gradient for the fill rect -->
    <linearGradient id="glass" gradientUnits="userSpaceOnUse" x1="256" y1="160" x2="256" y2="380">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.97"/>
      <stop offset="55%" stop-color="#FFFFFF" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#FFF8E8" stop-opacity="0.55"/>
    </linearGradient>

    <linearGradient id="shimmer-grad" gradientUnits="userSpaceOnUse" x1="256" y1="160" x2="256" y2="380">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.7"/>
      <stop offset="30%" stop-color="#FFFFFF" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <filter id="shadow" x="-15%" y="-10%" width="130%" height="150%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#A8882E" flood-opacity="0.40"/>
    </filter>

    <!-- MASK: all letters as solid white shapes — overlaps don't matter in a mask -->
    <mask id="letters">
      <!-- f -->
      <path d="M132,305 L132,192 Q132,168 152,168 L162,168" fill="none"
            stroke="white" stroke-width="38" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="106" y1="225" x2="158" y2="225" stroke="white" stroke-width="38" stroke-linecap="round"/>
      <!-- l -->
      <line x1="211" y1="168" x2="211" y2="305" stroke="white" stroke-width="38" stroke-linecap="round"/>
      <!-- i -->
      <line x1="264" y1="225" x2="264" y2="305" stroke="white" stroke-width="38" stroke-linecap="round"/>
      <circle cx="264" cy="183" r="19" fill="white"/>
      <!-- q bowl: stroked circle -->
      <circle cx="356" cy="268" r="40" fill="none" stroke="white" stroke-width="38"/>
      <!-- q descender: starts at bowl center y=268, butt cap hidden behind bowl -->
      <line x1="396" y1="268" x2="396" y2="360" stroke="white" stroke-width="38" stroke-linecap="butt"/>
      <!-- rounded bottom cap -->
      <circle cx="396" cy="360" r="19" fill="white"/>
    </mask>
  </defs>

  <g id="fliq-logo">
    <rect x="24" y="24" width="464" height="464" rx="104" fill="url(#bg)"/>
    <rect x="24" y="24" width="464" height="464" rx="104" fill="url(#bg-shine)"/>

    <!-- SHADOW -->
    <g filter="url(#shadow)" transform="translate(0,3)" opacity="0.22">
      <path d="M132,305 L132,192 Q132,168 152,168 L162,168" fill="none"
            stroke="#8B7420" stroke-width="38" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="106" y1="225" x2="158" y2="225" stroke="#8B7420" stroke-width="38" stroke-linecap="round"/>
      <line x1="211" y1="168" x2="211" y2="305" stroke="#8B7420" stroke-width="38" stroke-linecap="round"/>
      <line x1="264" y1="225" x2="264" y2="305" stroke="#8B7420" stroke-width="38" stroke-linecap="round"/>
      <circle cx="264" cy="183" r="19" fill="#8B7420"/>
      <circle cx="356" cy="268" r="40" fill="none" stroke="#8B7420" stroke-width="38"/>
      <line x1="396" y1="268" x2="396" y2="360" stroke="#8B7420" stroke-width="38" stroke-linecap="butt"/>
      <circle cx="396" cy="360" r="19" fill="#8B7420"/>
    </g>

    <!-- GLASS LETTERS — gradient applied through mask, no overlap artifacts -->
    <rect x="0" y="0" width="512" height="512" fill="url(#glass)" mask="url(#letters)"/>

    <!-- SHIMMER — same mask approach -->
    <rect x="0" y="0" width="512" height="512" fill="url(#shimmer-grad)" mask="url(#letters)"/>
  </g>
</svg>
