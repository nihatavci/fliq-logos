<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gold-grad" x1="0" y1="0.5" x2="1" y2="0.5">
      <stop offset="0%" stop-color="#F5E6C4"/>
      <stop offset="40%" stop-color="#C9A84C"/>
      <stop offset="70%" stop-color="#92710A"/>
      <stop offset="100%" stop-color="#6B5200"/>
    </linearGradient>
  </defs>
  <g id="fliq-logo">
    <g id="background">
      <rect x="24" y="24" width="464" height="464" rx="104" fill="#FFFFFF"/>
      <rect x="24" y="24" width="464" height="464" rx="104" fill="none" stroke="#EBEBF0" stroke-width="2"/>
    </g>
    <!-- FLIQ wordmark -->
    <text
      x="256" y="296"
      font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
      font-weight="900"
      font-style="italic"
      font-size="164"
      fill="url(#gold-grad)"
      text-anchor="middle"
      letter-spacing="-2"
    >FLIQ</text>
    <!-- Witty touch: 3 small golden sparkle stars scattered around the text — like "magic" -->
    <g id="sparkles">
      <!-- Top-right sparkle (4-point star) -->
      <path d="M400 140 L404 152 L416 156 L404 160 L400 172 L396 160 L384 156 L396 152Z" fill="#C9A84C" opacity="0.5"/>
      <!-- Top-left tiny sparkle -->
      <path d="M120 160 L122 166 L128 168 L122 170 L120 176 L118 170 L112 168 L118 166Z" fill="#C9A84C" opacity="0.35"/>
      <!-- Bottom-right sparkle -->
      <path d="M420 340 L423 349 L432 352 L423 355 L420 364 L417 355 L408 352 L417 349Z" fill="#C9A84C" opacity="0.4"/>
    </g>
    <!-- Subtle underline swoosh — confident flick gesture -->
    <path d="M130 330 Q256 350 400 320" stroke="#C9A84C" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.25"/>
  </g>
</svg>
