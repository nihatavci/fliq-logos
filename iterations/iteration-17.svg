<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Premium left-to-right gold gradient like Rizz's smooth transition -->
    <linearGradient id="gold-grad" x1="0" y1="0.5" x2="1" y2="0.5">
      <stop offset="0%" stop-color="#E8C84A"/>
      <stop offset="50%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#A8882E"/>
    </linearGradient>
  </defs>
  <g id="fliq-logo">
    <!-- White rounded square -->
    <g id="background">
      <rect x="24" y="24" width="464" height="464" rx="104" fill="#FFFFFF"/>
      <rect x="24" y="24" width="464" height="464" rx="104" fill="none" stroke="#EBEBF0" stroke-width="2"/>
    </g>
    <!-- FLIQ wordmark — bold italic, clean like Rizz -->
    <text
      x="256" y="300"
      font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
      font-weight="900"
      font-style="italic"
      font-size="176"
      stroke="url(#gold-grad)"
      stroke-width="6"
      fill="url(#gold-grad)"
      text-anchor="middle"
      letter-spacing="-2"
    >FLIQ</text>
  </g>
</svg>
