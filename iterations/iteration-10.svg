<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <g id="background">
    <rect x="24" y="24" width="464" height="464" rx="104" fill="#FFFFFF" stroke="#EBEBF0" stroke-width="2"/>
  </g>

  <!-- Clipping region to keep everything inside the rounded rect -->
  <defs>
    <clipPath id="icon-clip">
      <rect x="24" y="24" width="464" height="464" rx="104"/>
    </clipPath>
  </defs>

  <g clip-path="url(#icon-clip)">

    <!-- Left profile silhouette facing right -->
    <g id="silhouette-left">
      <!-- Shadow layer -->
      <path d="
        M 82 380
        L 82 320
        C 82 300, 94 288, 106 276
        C 96 264, 88 244, 88 220
        C 88 172, 118 136, 158 136
        C 184 136, 206 152, 218 178
        C 226 196, 226 216, 220 234
        C 214 248, 204 258, 192 268
        C 202 278, 208 292, 208 310
        L 208 380
        Z
      " fill="#0D0D14" opacity="0.06"/>
      <!-- Main shape -->
      <path d="
        M 88 376
        L 88 316
        C 88 298, 98 286, 110 274
        C 100 262, 94 244, 94 222
        C 94 176, 122 142, 158 142
        C 182 142, 202 156, 214 180
        C 220 196, 222 214, 216 230
        C 210 246, 200 256, 190 264
        C 198 274, 202 288, 202 304
        L 202 376
        Z
      " fill="#F5E6C4"/>
    </g>

    <!-- Right profile silhouette facing left (mirrored) -->
    <g id="silhouette-right">
      <!-- Shadow layer -->
      <path d="
        M 430 380
        L 430 320
        C 430 300, 418 288, 406 276
        C 416 264, 424 244, 424 220
        C 424 172, 394 136, 354 136
        C 328 136, 306 152, 294 178
        C 286 196, 286 216, 292 234
        C 298 248, 308 258, 320 268
        C 310 278, 304 292, 304 310
        L 304 380
        Z
      " fill="#0D0D14" opacity="0.06"/>
      <!-- Main shape -->
      <path d="
        M 424 376
        L 424 316
        C 424 298, 414 286, 402 274
        C 412 262, 418 244, 418 222
        C 418 176, 390 142, 354 142
        C 330 142, 310 156, 298 180
        C 292 196, 290 214, 296 230
        C 302 246, 312 256, 322 264
        C 314 274, 310 288, 310 304
        L 310 376
        Z
      " fill="#F5E6C4"/>
    </g>

    <!-- Neural connection lines between profiles -->
    <g id="neural-connections">
      <!-- Primary horizontal bridges -->
      <line x1="202" y1="210" x2="310" y2="210" stroke="#C9A84C" stroke-width="2.5" opacity="0.25"/>
      <line x1="202" y1="240" x2="310" y2="240" stroke="#C9A84C" stroke-width="2.5" opacity="0.2"/>
      <line x1="196" y1="270" x2="316" y2="270" stroke="#C9A84C" stroke-width="2" opacity="0.15"/>

      <!-- Diagonal connections to center spark -->
      <line x1="210" y1="190" x2="256" y2="230" stroke="#E8C84A" stroke-width="2" opacity="0.4"/>
      <line x1="302" y1="190" x2="256" y2="230" stroke="#E8C84A" stroke-width="2" opacity="0.4"/>
      <line x1="210" y1="270" x2="256" y2="230" stroke="#E8C84A" stroke-width="2" opacity="0.3"/>
      <line x1="302" y1="270" x2="256" y2="230" stroke="#E8C84A" stroke-width="2" opacity="0.3"/>

      <!-- Secondary cross-connections -->
      <line x1="224" y1="198" x2="256" y2="198" stroke="#C9A84C" stroke-width="1.5" opacity="0.25"/>
      <line x1="256" y1="198" x2="288" y2="198" stroke="#C9A84C" stroke-width="1.5" opacity="0.25"/>
      <line x1="228" y1="256" x2="256" y2="230" stroke="#C9A84C" stroke-width="1.5" opacity="0.2"/>
      <line x1="284" y1="256" x2="256" y2="230" stroke="#C9A84C" stroke-width="1.5" opacity="0.2"/>
      <line x1="228" y1="256" x2="284" y2="256" stroke="#C9A84C" stroke-width="1.5" opacity="0.15"/>

      <!-- Fine tertiary web -->
      <line x1="236" y1="214" x2="276" y2="246" stroke="#C9A84C" stroke-width="1" opacity="0.15"/>
      <line x1="276" y1="214" x2="236" y2="246" stroke="#C9A84C" stroke-width="1" opacity="0.15"/>
    </g>

    <!-- Neural nodes -->
    <g id="neural-nodes">
      <!-- Left-side nodes near profile edge -->
      <circle cx="210" cy="190" r="8" fill="#E8C84A" opacity="0.5"/>
      <circle cx="210" cy="270" r="8" fill="#E8C84A" opacity="0.4"/>
      <circle cx="224" cy="198" r="6" fill="#C9A84C" opacity="0.4"/>

      <!-- Right-side nodes near profile edge -->
      <circle cx="302" cy="190" r="8" fill="#E8C84A" opacity="0.5"/>
      <circle cx="302" cy="270" r="8" fill="#E8C84A" opacity="0.4"/>
      <circle cx="288" cy="198" r="6" fill="#C9A84C" opacity="0.4"/>

      <!-- Mid-field nodes -->
      <circle cx="236" cy="214" r="5" fill="#E8C84A" opacity="0.35"/>
      <circle cx="276" cy="214" r="5" fill="#E8C84A" opacity="0.35"/>
      <circle cx="228" cy="256" r="5" fill="#E8C84A" opacity="0.3"/>
      <circle cx="284" cy="256" r="5" fill="#E8C84A" opacity="0.3"/>
      <circle cx="236" cy="246" r="4" fill="#C9A84C" opacity="0.25"/>
      <circle cx="276" cy="246" r="4" fill="#C9A84C" opacity="0.25"/>

      <!-- Top and bottom center nodes -->
      <circle cx="256" cy="198" r="6" fill="#E8C84A" opacity="0.55"/>
      <circle cx="256" cy="260" r="5" fill="#E8C84A" opacity="0.4"/>

      <!-- Central glowing spark — the strongest connection point -->
      <circle cx="256" cy="230" r="28" fill="#FFF8E8" opacity="0.12"/>
      <circle cx="256" cy="230" r="18" fill="#E8C84A" opacity="0.15"/>
      <circle cx="256" cy="230" r="11" fill="#E8C84A"/>
      <circle cx="256" cy="230" r="5.5" fill="#FFF8E8"/>
    </g>

  </g>
</svg>