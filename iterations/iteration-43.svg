<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#F7D96E"/>
      <stop offset="45%" stop-color="#E8C84A"/>
      <stop offset="100%" stop-color="#C9A84C"/>
    </linearGradient>
    <linearGradient id="bg-shine" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.30"/>
      <stop offset="45%" stop-color="#FFFFFF" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="glass" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.97"/>
      <stop offset="55%" stop-color="#FFFFFF" stop-opacity="0.82"/>
      <stop offset="100%" stop-color="#FFF8E8" stop-opacity="0.60"/>
    </linearGradient>
    <linearGradient id="shimmer" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="35%" stop-color="#FFFFFF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-15%" y="-10%" width="130%" height="150%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#A8882E" flood-opacity="0.50"/>
    </filter>
    <filter id="glow" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <g id="fliq-logo">
    <rect x="24" y="24" width="464" height="464" rx="104" fill="url(#bg)"/>
    <rect x="24" y="24" width="464" height="464" rx="104" fill="url(#bg-shine)"/>

    <!--
      EQUAL VISUAL GAPS — calculated from visual edges (stroke=38, half=19):

      f: stem x=122, crossbar 104-140. Visual: 85 to 159. Width=74
      l: x=203. Visual: 184 to 222. Width=38
      i: x=266. Visual: 247 to 285. Width=38
      q: bowl cx=369 r=40. Visual: 310 to 428. Width=118

      Gaps: f→l=25, l→i=25, i→q=25  ← ALL EQUAL
      Left pad: 85-24=61, Right pad: 488-428=60  ← CENTERED

      Baseline=305, x-height=225, ascender=168
      q tail stops at y=368, kicks to x=425 — well inside bounds
    -->

    <!-- SHADOW -->
    <g filter="url(#shadow)" transform="translate(0,3)">
      <path d="M122,305 L122,192 Q122,168 142,168 L152,168" fill="none"
            stroke="#B8942A" stroke-opacity="0.25" stroke-width="38"
            stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="104" y1="225" x2="140" y2="225" stroke="#B8942A" stroke-opacity="0.25"
            stroke-width="38" stroke-linecap="round"/>
      <line x1="203" y1="168" x2="203" y2="305" stroke="#B8942A" stroke-opacity="0.25"
            stroke-width="38" stroke-linecap="round"/>
      <line x1="266" y1="225" x2="266" y2="305" stroke="#B8942A" stroke-opacity="0.25"
            stroke-width="38" stroke-linecap="round"/>
      <circle cx="266" cy="183" r="19" fill="#B8942A" fill-opacity="0.25"/>
      <circle cx="369" cy="268" r="40" fill="none"
              stroke="#B8942A" stroke-opacity="0.25" stroke-width="38" stroke-linecap="round"/>
      <path d="M409,285 L409,350 Q409,368 425,368" fill="none"
            stroke="#B8942A" stroke-opacity="0.25" stroke-width="38"
            stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- MAIN GLASS -->
    <g filter="url(#glow)">
      <!-- f -->
      <path d="M122,305 L122,192 Q122,168 142,168 L152,168" fill="none"
            stroke="url(#glass)" stroke-width="38"
            stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="104" y1="225" x2="140" y2="225" stroke="url(#glass)"
            stroke-width="38" stroke-linecap="round"/>

      <!-- l -->
      <line x1="203" y1="168" x2="203" y2="305" stroke="url(#glass)"
            stroke-width="38" stroke-linecap="round"/>

      <!-- i -->
      <line x1="266" y1="225" x2="266" y2="305" stroke="url(#glass)"
            stroke-width="38" stroke-linecap="round"/>
      <circle cx="266" cy="183" r="19" fill="url(#glass)"/>

      <!-- q bowl -->
      <circle cx="369" cy="268" r="40" fill="none"
              stroke="url(#glass)" stroke-width="38" stroke-linecap="round"/>
      <!-- q tail — same glass gradient -->
      <path d="M409,285 L409,350 Q409,368 425,368" fill="none"
            stroke="url(#glass)" stroke-width="38"
            stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- SHIMMER -->
    <g>
      <path d="M122,305 L122,192 Q122,168 142,168 L152,168" fill="none"
            stroke="url(#shimmer)" stroke-width="38"
            stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="104" y1="225" x2="140" y2="225" stroke="url(#shimmer)"
            stroke-width="38" stroke-linecap="round"/>
      <line x1="203" y1="168" x2="203" y2="305" stroke="url(#shimmer)"
            stroke-width="38" stroke-linecap="round"/>
      <line x1="266" y1="225" x2="266" y2="305" stroke="url(#shimmer)"
            stroke-width="38" stroke-linecap="round"/>
      <circle cx="266" cy="183" r="19" fill="url(#shimmer)"/>
      <circle cx="369" cy="268" r="40" fill="none"
              stroke="url(#shimmer)" stroke-width="38" stroke-linecap="round"/>
      <path d="M409,285 L409,350 Q409,368 425,368" fill="none"
            stroke="url(#shimmer)" stroke-width="38"
            stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- White edge border -->
    <g>
      <path d="M122,305 L122,192 Q122,168 142,168 L152,168" fill="none"
            stroke="#FFFFFF" stroke-opacity="0.35" stroke-width="40"
            stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M122,305 L122,192 Q122,168 142,168 L152,168" fill="none"
            stroke="url(#glass)" stroke-width="36"
            stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="104" y1="225" x2="140" y2="225" stroke="#FFFFFF" stroke-opacity="0.35"
            stroke-width="40" stroke-linecap="round"/>
      <line x1="104" y1="225" x2="140" y2="225" stroke="url(#glass)"
            stroke-width="36" stroke-linecap="round"/>

      <line x1="203" y1="168" x2="203" y2="305" stroke="#FFFFFF" stroke-opacity="0.35"
            stroke-width="40" stroke-linecap="round"/>
      <line x1="203" y1="168" x2="203" y2="305" stroke="url(#glass)"
            stroke-width="36" stroke-linecap="round"/>

      <line x1="266" y1="225" x2="266" y2="305" stroke="#FFFFFF" stroke-opacity="0.35"
            stroke-width="40" stroke-linecap="round"/>
      <line x1="266" y1="225" x2="266" y2="305" stroke="url(#glass)"
            stroke-width="36" stroke-linecap="round"/>

      <circle cx="369" cy="268" r="40" fill="none"
              stroke="#FFFFFF" stroke-opacity="0.35" stroke-width="40" stroke-linecap="round"/>
      <circle cx="369" cy="268" r="40" fill="none"
              stroke="url(#glass)" stroke-width="36" stroke-linecap="round"/>
      <path d="M409,285 L409,350 Q409,368 425,368" fill="none"
            stroke="#FFFFFF" stroke-opacity="0.35" stroke-width="40"
            stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M409,285 L409,350 Q409,368 425,368" fill="none"
            stroke="url(#glass)" stroke-width="36"
            stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>
</svg>
